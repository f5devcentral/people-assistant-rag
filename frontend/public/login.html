<html>
  <head>
    <meta charset="utf-8">
    <title>People Assistant — Login</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <!-- Load runtime config generated by Render build step -->
    <script src="config.js"></script>
    <style>
      body {
        margin: 0; font-family: system-ui, sans-serif; background: #0a0f1f; color: #e9ecf7;
        display: flex; justify-content: center; align-items: center; height: 100vh;
      }
      .card {
        background: #121931; border: 1px solid #28314f; border-radius: 12px;
        padding: 24px; width: 300px;
      }
      input, button {
        width: 100%; padding: 10px; margin: 6px 0;
        border-radius: 8px; border: 1px solid #28314f;
        background: #0e1530; color: #e9ecf7;
      }
      button {
        background: linear-gradient(90deg,#5dd0ff,#a27bff); border:none; cursor:pointer; font-weight:600;
      }
      .muted { font-size: 12px; color: #a0a7c0; margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2 style="margin-top:0">Sign in</h2>
      <div class="muted">Use demo credentials (admin / root)</div>
      <input id="user" placeholder="Username" autocomplete="username">
      <input id="pass" type="password" placeholder="Password" autocomplete="current-password">
      <button id="loginBtn">Login</button>
      <div id="msg" class="muted"></div>
    </div>

    <script>
      const API_BASE = (window.APP_CONFIG && window.APP_CONFIG.apiBase) || "http://localhost:8000";
      async function login(){
        const username = document.getElementById('user').value.trim();
        const password = document.getElementById('pass').value.trim();
        const msg = document.getElementById('msg');
        try {
          const res = await fetch(`${API_BASE}/token`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, no_exp: false })
          });
          const data = await res.json();
          if(!res.ok) throw new Error(data?.detail || data?.error || 'Login failed');
          localStorage.setItem('people_token', data.access_token);
          window.location.href = '/index.html';
        } catch(e){
          msg.textContent = e.message;
        }
      }
      document.getElementById('loginBtn').onclick = login;
      document.getElementById('pass').addEventListener('keydown', (e)=>{
        if(e.key==='Enter') login();
      });
    </script>
  </body>
</html>
